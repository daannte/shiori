services:
  db:
    image: mariadb
    container_name: shiori-db
    volumes:
      - db:/var/lib/mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: shiori
      MYSQL_DATABASE: shiori
      MYSQL_USER: shiori
      MYSQL_PASSWORD: shiori
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-pshiori" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: shiori-backend
    image: ghcr.io/astral-sh/uv:python3.14-alpine
    restart: unless-stopped
    working_dir: /backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql://shiori:shiori@db:3306/shiori
      ALLOWED_ORIGINS: http://localhost:5173
    volumes:
      - ./backend:/backend
      - ./dev/library:/library
      - ./dev/data:/data
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      apk add --no-cache pkgconf gcc mariadb-dev mariadb-client musl-dev &&
      uv sync --locked &&
      uv run manage.py migrate &&
      uv run manage.py runserver 0.0.0.0:8000
      "

  frontend:
    container_name: shiori-frontend
    image: oven/bun:1-alpine
    restart: unless-stopped
    working_dir: /frontend
    volumes:
      - ./frontend:/frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
    command: sh -c "bun install && bun run dev --open --host 0.0.0.0 --no-open"

volumes:
  db:
